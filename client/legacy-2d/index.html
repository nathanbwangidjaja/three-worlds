<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our 5 Years</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0b0a14;
        color: #f5e6d3;
        font-family: "Georgia", serif;
        overflow: hidden;
        height: 100%;
      }
      #game { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
      canvas { image-rendering: pixelated; image-rendering: crisp-edges; }

      /* Login overlay */
      #login {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        background: radial-gradient(circle at 50% 40%, #2a1a3a 0%, #0b0a14 70%);
        z-index: 10;
      }
      #login h1 { font-size: 38px; margin: 0; letter-spacing: 2px; }
      #login p { opacity: 0.7; margin: 0; }
      #login .row { display: flex; gap: 12px; }
      #login button {
        background: #f5e6d3; color: #2a1a3a; border: none; padding: 12px 24px;
        font-size: 16px; font-family: inherit; cursor: pointer; border-radius: 6px;
        transition: transform 0.1s;
      }
      #login button:hover { transform: scale(1.05); }
      #login input {
        background: rgba(255,255,255,0.1); color: #f5e6d3; border: 1px solid #f5e6d3;
        padding: 10px 14px; font-size: 16px; font-family: inherit; border-radius: 6px;
        text-align: center;
      }

      /* Dialogue box */
      #dialogue {
        position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%);
        width: min(720px, 90vw); background: rgba(11, 10, 20, 0.92);
        border: 2px solid #f5e6d3; border-radius: 10px; padding: 20px 24px;
        font-size: 18px; line-height: 1.5; display: none; z-index: 5;
        box-shadow: 0 0 30px rgba(245, 230, 211, 0.2);
      }
      #dialogue .speaker { color: #ffb6c1; font-weight: bold; margin-bottom: 8px; font-size: 16px; }
      #dialogue .text { white-space: pre-wrap; }
      #dialogue .hint { margin-top: 12px; font-size: 13px; opacity: 0.6; text-align: right; }
      #dialogue img { max-width: 100%; max-height: 280px; border-radius: 6px; margin-top: 10px; display: block; }

      /* Interact hint */
      #hint {
        position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%);
        background: rgba(11, 10, 20, 0.8); border: 1px solid #f5e6d3;
        padding: 6px 14px; border-radius: 20px; font-size: 14px; display: none; z-index: 4;
      }
    </style>
  </head>
  <body>
    <div id="login">
      <h1>Our Five Years</h1>
      <p>An anniversary gift, for us to walk through together.</p>
      <input id="name-input" placeholder="Your name" maxlength="20" />
      <div class="row">
        <button data-role="her">I'm her</button>
        <button data-role="you">I'm him</button>
      </div>
      <p style="font-size: 12px; opacity: 0.5;">Arrow keys / WASD to move · Space or E to interact</p>
    </div>

    <div id="game"></div>

    <div id="hint">Press <b>Space</b> to interact</div>
    <div id="dialogue">
      <div class="speaker"></div>
      <div class="text"></div>
      <img style="display:none;" />
      <div class="hint">Space to continue</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
